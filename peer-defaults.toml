# peer-mcp — default backend registry.
#
# This file is shipped with the MCP and copied to `~/.nott/peer.toml` on the
# first boot if that file does not exist. Edit `~/.nott/peer.toml` to add new
# backends or override defaults; this file is NEVER read at runtime if a user
# toml exists.
#
# Placeholders supported in `args`:
#   {prompt}               — substituted with the caller's prompt
#   {env:VAR:default}      — env var with fallback
#   {extra}                — splat of caller-supplied extra_args
#
# If `stdin = true`, the prompt is piped via stdin and {prompt} is NOT
# substituted in args. Use one mechanism, not both.

[[backend]]
name = "codex"
description = "OpenAI Codex CLI — forensic code verification (ask) + $imagegen convention (image)"
command = "codex"
args = ["exec"]
stdin = true
timeout_ms_default = 480000
auth_hint = "run `codex login` if calls return 401/403"
kinds = ["ask", "image"]
# Image dispatch reuses the `codex` binary but appends --full-auto so the
# imagegen plugin can run tool calls without approval prompts.
image_extra_args = ["--full-auto"]
image_template = "$imagegen {prompt}. Salve em {output_path}"
image_edit_template = "$imagegen {edit_prompt}. Salve em {output_path}"
image_edit_prefix_args = ["-i", "{input_path}"]

[[backend]]
name = "gemini"
description = "Google Gemini CLI — architectural reasoning"
command = "gemini"
args = ["-p", "{prompt}"]
stdin = false
timeout_ms_default = 120000
auth_hint = "run `gemini auth` if calls return auth errors"

[[backend]]
name = "minimax"
description = "Claude CLI via MiniMax settings — outside-triad perspective"
command = "claude"
args = ["--settings", "{env:MINIMAX_SETTINGS:~/.claude/settings.minimax.json}", "-p", "{prompt}"]
stdin = false
timeout_ms_default = 180000
auth_hint = "check ~/.claude/settings.minimax.json"

[[backend]]
name = "claude"
description = "Fresh Claude CLI — product/architecture reasoning"
command = "claude"
args = ["-p", "{prompt}"]
stdin = false
timeout_ms_default = 180000
auth_hint = "run `claude auth login` if calls return auth errors"

# -------------------------------------------------------------------------
# Image backends — invoked via the `image` MCP tool. These entries set
# `kinds = ["image"]` so they do NOT appear in `ask`. The `command` field is
# unused for HTTP transport but must be present; convention is to repeat
# the provider name.
# -------------------------------------------------------------------------

[[backend]]
name = "nanobanana"
description = "Nano Banana (Gemini image) — HTTP via generativelanguage.googleapis.com"
command = "nanobanana"  # unused for http transport
timeout_ms_default = 60000
kinds = ["image"]
transport = "http"
provider = "gemini"
model = "gemini-3.1-flash-image-preview"
api_key_env = "GOOGLE_AI_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"
aspect_ratio_default = "16:9"
auth_hint = "set GOOGLE_AI_API_KEY from https://aistudio.google.com/apikey"

[[backend]]
name = "minimax-image"
description = "MiniMax image-01 — HTTP via api.minimax.io (global; Chinese platform uses .minimaxi.com + separate key)"
command = "minimax-image"  # unused for http transport
timeout_ms_default = 60000
kinds = ["image"]
transport = "http"
provider = "minimax"
model = "image-01"
api_key_env = "MINIMAX_API_KEY"
base_url = "https://api.minimax.io/v1/image_generation"
aspect_ratio_default = "16:9"
auth_hint = "set MINIMAX_API_KEY for the global platform (api.minimax.io). Chinese platform uses api.minimaxi.com with a separate key."

[[backend]]
name = "minimax-video"
description = "MiniMax video (async: create task -> poll -> download). Hailuo-02 default. Wall-clock ~3-5 min typical."
command = "minimax-video"  # unused for http transport
# 10 min default budget; API takes 2-5 min typical, worst ~8 min.
timeout_ms_default = 600000
kinds = ["video"]
transport = "http"
provider = "minimax"
model = "MiniMax-Hailuo-02"
api_key_env = "MINIMAX_API_KEY"
# Base URL is the /v1 prefix; provider appends /video_generation, /query/video_generation, /files/retrieve.
base_url = "https://api.minimax.io/v1"
auth_hint = "set MINIMAX_API_KEY for the global platform. Video uses the same key as image-01."
